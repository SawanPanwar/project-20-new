{% include "./Header.html" %}

<br>

<div class="container">

    <form method="POST">

        <input type="hidden" name="pageNo" value="{{form.pageNo}}">

        <!-- Search Card -->

        <div class="card mb-3">

            <div class="card-header d-flex justify-content-between align-items-center">

                <h5 class="mb-0">
                    <i class="fas fa-user-tag"></i> Role List
                </h5>

                <a href="/ORS/Role" class="btn btn-success btn-sm">
                    <i class="fas fa-plus-circle"></i> Add Role
                </a>

            </div>

            <div class="card-body">

                <div class="form-row align-items-end">

                    <div class="col-lg-3 col-md-4 mb-2">

                        <label class="small mb-1">Role Name</label>

                        <input
                            type="text"
                            class="form-control form-control-sm"
                            name="name"
                            value="{{form.name}}"
                            placeholder="Role Name">

                    </div>

                    <div class="col-lg-4 col-md-4 mb-2">

                        <label class="small mb-1">Description</label>

                        <input
                            type="text"
                            class="form-control form-control-sm"
                            name="description"
                            value="{{form.description}}"
                            placeholder="Description">

                    </div>

                    <div class="col-lg-2 col-md-4 mb-2">

                        <button
                            type="submit"
                            name="operation"
                            value="Search"
                            class="btn btn-primary btn-sm btn-block">

                            <i class="fas fa-search"></i> Search

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- Role Table -->

        <div class="card">

            <div class="card-body p-0">

                <table class="table table-sm table-bordered table-hover mb-0">

                    <thead class="thead-dark">

                        <tr>
                            <th width="10%">#</th>
                            <th width="25%">ROLE</th>
                            <th width="45%">DESCRIPTION</th>
                            <th width="20%">ACTION</th>
                        </tr>

                    </thead>

                    <tbody>

                        {% for e in pageList %}

                        <tr>

                            <td>{{e.id}}</td>
                            <td>{{e.name}}</td>
                            <td>{{e.description}}</td>

                            <td>

                                <a href="/ORS/Role/{{e.id}}" class="btn btn-primary btn-sm">
                                    <i class="fas fa-edit"></i>
                                </a>

                                <a href="/ORS/RoleList/delete/{{e.id}}" class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash"></i>
                                </a>

                            </td>

                        </tr>

                        {% empty %}

                        <tr>

                            <td colspan="4" class="text-center text-muted p-3">
                                No Records Found
                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

        <!-- Pagination -->

        <div class="row mt-3">

            <div class="col-md-12 d-flex justify-content-between align-items-center">

                <button
                    type="submit"
                    name="operation"
                    value="Previous"
                    class="btn btn-secondary btn-sm"
                    {% if form.pageNo == 1 %}disabled{% endif %}>

                    <i class="fas fa-arrow-left"></i> Previous

                </button>

                <span class="font-weight-bold">
                    Page : {{form.pageNo}}
                </span>

                <button
                    type="submit"
                    name="operation"
                    value="Next"
                    class="btn btn-secondary btn-sm"
                    {% if form.maxId == form.lastId %}disabled{% endif %}>

                    Next <i class="fas fa-arrow-right"></i>

                </button>

            </div>

        </div>

    </form>

</div>

{% include "./Footer.html" %}
